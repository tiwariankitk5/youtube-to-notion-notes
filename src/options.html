<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube to Notion Notes Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-layout">
      <section class="hero">
        <p class="kicker">Settings</p>
        <h1>Connect your AI model and shape the note style.</h1>
        <p class="muted">These values are stored with Chrome sync storage so the extension can analyze videos directly from YouTube.</p>
      </section>

      <form id="settingsForm" class="settings-card">
        <label>
          <span>API key</span>
          <input type="password" id="apiKey" placeholder="sk-..." />
        </label>
        <label>
          <span>API URL</span>
          <input type="url" id="apiUrl" placeholder="https://api.openai.com/v1/responses" />
        </label>
        <label>
          <span>Model</span>
          <input type="text" id="model" placeholder="gpt-4.1-mini" />
        </label>
        <label>
          <span>Temperature</span>
          <input type="number" id="temperature" min="0" max="2" step="0.1" />
        </label>
        <label>
          <span>Extra instructions</span>
          <textarea id="extraInstructions" rows="8" placeholder="Example: focus on technical concepts and create dense glossary entries."></textarea>
        </label>
        <div class="actions">
          <button type="submit">Save Settings</button>
          <p id="status" class="muted"></p>
        </div>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
