<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Notes</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <p class="kicker">YouTube to Notes</p>
      <h1>Build study notes from the current video.</h1>

        <button id="reloadTab">Refresh Current Tab</button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
